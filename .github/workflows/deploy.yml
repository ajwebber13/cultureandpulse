# ══════════════════════════════════════════════════════════════
# Culture & Pulse — STEP 2: Deploy Site
# ══════════════════════════════════════════════════════════════
# Triggers when you merge a stories PR → deploys live.
# Can also be triggered manually from the Actions tab.
# ══════════════════════════════════════════════════════════════

name: "🚀 Deploy Site"

on:
  push:
    branches: [main]
    paths:
      - 'stories.json'
      - 'culture-and-pulse.html'
  workflow_dispatch:        # ← manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp culture-and-pulse.html _site/index.html
          cp stories.json _site/stories.json
          echo "Site files ready:"
          ls -lh _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print deploy summary
        run: |
          echo "✅  Culture & Pulse is LIVE"
          echo "🌐  ${{ steps.deploy.outputs.page_url }}"
